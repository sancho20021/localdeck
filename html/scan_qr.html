<!DOCTYPE html>
<html>

<head>
    <title>QR Scanner</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family: monospace; text-align: center;">

    <h2>QR Scanner</h2>

    <video id="video" autoplay playsinline style="width: 100%; max-width: 420px;"></video>

    <pre id="output" style="padding: 10px; border-radius: 8px; background: #111; color: white;">
Waiting for QR...
  </pre>

    <audio id="audio" controls style="width: 100%; margin-top: 20px;"></audio>

    <script src="https://unpkg.com/jsqr/dist/jsQR.js"></script>

    <script>
        const video = document.getElementById("video");
        const output = document.getElementById("output");
        const audio = document.getElementById("audio");

        let lastQR = "";

        function setStatus(text, type = "info") {
            let color = "#222";

            if (type === "good") color = "#1f7a1f";
            if (type === "bad") color = "#8b1a1a";

            output.style.background = color;
            output.textContent = text;
        }

        // ✅ Flexible hash extraction:
        // accepts:
        //  - "h=abc123"
        //  - "abc123"
        //  - full URL with ?h=abc123
        function extractHash(text) {
            try {
                // try full URL first
                const url = new URL(text);
                const hash = url.searchParams.get("h");
                if (hash) return { hash };
            } catch {
                // not a URL, continue
            }

            // try "h=abc123"
            const matchParam = text.match(/h=([a-zA-Z0-9]+)/);
            if (matchParam) return { hash: matchParam[1] };

            // try raw hash
            const matchRaw = text.match(/^[a-zA-Z0-9]+$/);
            if (matchRaw) return { hash: text };

            return { error: "Could not extract track hash" };
        }

        async function play(hash, raw) {
            const url = window.location.origin + "/play?h=" + hash;

            setStatus(
                "VALID QR\n\nPlaying track:\n" + hash,
                "good"
            );

            audio.pause();
            audio.onerror = null;

            audio.src = url;
            audio.load();

            audio.onerror = () => {
                setStatus(
                    "PLAYBACK ERROR ❌\n\n" +
                    "Could not load track\n\n" +
                    "Read:\n" + raw + "\n\n" +
                    "URL:\n" + url,
                    "bad"
                );
            };

            const p = audio.play();

            if (p !== undefined) {
                p.catch(() => {
                    setStatus(
                        "AUDIO BLOCKED\n\nTap screen once to enable playback",
                        "bad"
                    );
                });
            }
        }

        navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" }
        }).then(stream => {
            video.srcObject = stream;
            video.play();
            requestAnimationFrame(scan);
        }).catch(err => {
            setStatus("Camera error: " + err, "bad");
        });

        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");

        function scan() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;

                ctx.drawImage(video, 0, 0);

                const image = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const code = jsQR(image.data, canvas.width, canvas.height);

                if (code) {
                    const raw = code.data;

                    if (raw !== lastQR) {
                        lastQR = raw;

                        const result = extractHash(raw);

                        if (result.error) {
                            setStatus(
                                "INVALID QR\n\n" +
                                "Read:\n" + raw + "\n\n" +
                                "Reason:\n" + result.error,
                                "bad"
                            );
                        } else {
                            play(result.hash, raw);
                        }
                    }
                }
            }

            requestAnimationFrame(scan);
        }
    </script>

</body>

</html>
